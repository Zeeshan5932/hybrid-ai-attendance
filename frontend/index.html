<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Attendance System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              /* Override indigo → violet so all pages auto-update */
              indigo: {
                50:  '#faf5ff',
                100: '#f3e8ff',
                200: '#e9d5ff',
                300: '#d8b4fe',
                400: '#c084fc',
                500: '#a855f7',
                600: '#9333ea',
                700: '#7e22ce',
                800: '#6b21a8',
                900: '#4c1d95',
              },
              brand: {
                50:  '#faf5ff',
                100: '#f3e8ff',
                200: '#e9d5ff',
                300: '#d8b4fe',
                400: '#c084fc',
                500: '#a855f7',
                600: '#9333ea',
                700: '#7e22ce',
                800: '#6b21a8',
                900: '#4c1d95',
              },
              cyber: {
                300: '#67e8f9',
                400: '#22d3ee',
                500: '#06b6d4',
                600: '#0891b2',
              },
            },
            fontFamily: {
              sans: ['Inter', 'system-ui', 'sans-serif'],
            },
            animation: {
              'fade-up':    'fadeUp 0.45s ease both',
              'fade-in':    'fadeIn 0.3s ease both',
              'slide-left': 'slideLeft 0.35s ease both',
              'bounce-in':  'bounceIn 0.45s cubic-bezier(.36,.07,.19,.97) both',
              'float':      'float 7s ease-in-out infinite',
              'float-slow': 'float 11s ease-in-out infinite',
              'shimmer':    'shimmer 2.4s linear infinite',
              'glow':       'glow 2.5s ease-in-out infinite',
              'toast-in':   'toastIn 0.35s cubic-bezier(.21,1.02,.73,1) both',
              'spin-slow':  'spin 10s linear infinite',
            },
            keyframes: {
              fadeUp:   { '0%': { opacity:'0', transform:'translateY(18px)' }, '100%': { opacity:'1', transform:'translateY(0)' } },
              fadeIn:   { '0%': { opacity:'0' }, '100%': { opacity:'1' } },
              slideLeft:{ '0%': { opacity:'0', transform:'translateX(-18px)' }, '100%': { opacity:'1', transform:'translateX(0)' } },
              bounceIn: { '0%':{ opacity:'0', transform:'scale(0.72)' }, '60%':{ opacity:'1', transform:'scale(1.06)' }, '100%':{ transform:'scale(1)' } },
              float:    { '0%,100%':{ transform:'translateY(0px)' }, '50%':{ transform:'translateY(-14px)' } },
              shimmer:  { '0%':{ backgroundPosition:'-400px 0' }, '100%':{ backgroundPosition:'400px 0' } },
              glow:     { '0%,100%':{ boxShadow:'0 0 6px rgba(147,51,234,0.3)' }, '50%':{ boxShadow:'0 0 28px rgba(147,51,234,0.65), 0 0 8px rgba(6,182,212,0.3)' } },
              toastIn:  { '0%':{ opacity:'0', transform:'translateX(80px) scale(0.92)' }, '100%':{ opacity:'1', transform:'translateX(0) scale(1)' } },
            },
          },
        },
      }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
    <style>
      *, *::before, *::after { box-sizing: border-box; }
      html { scroll-behavior: smooth; }
      body { font-family: 'Inter', system-ui, sans-serif; -webkit-font-smoothing: antialiased; }

      /* ── Scrollbar ── */
      ::-webkit-scrollbar { width: 5px; height: 5px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: linear-gradient(to bottom, #9333ea, #06b6d4); border-radius: 99px; }

      /* ── Gradient text ── */
      .text-gradient {
        background: linear-gradient(135deg, #c084fc 0%, #22d3ee 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }

      /* ── Glassmorphism ── */
      .glass {
        backdrop-filter: blur(14px) saturate(1.6);
        background: rgba(255,255,255,0.09);
        border: 1px solid rgba(255,255,255,0.13);
      }
      .glass-card {
        backdrop-filter: blur(16px) saturate(1.9);
        background: rgba(255,255,255,0.93);
        border: 1px solid rgba(147,51,234,0.09);
        box-shadow: 0 4px 24px rgba(147,51,234,0.07), 0 1px 0 rgba(255,255,255,0.9) inset;
      }

      /* ── Animated gradient border ── */
      .grad-border { position: relative; }
      .grad-border::before {
        content: '';
        position: absolute; inset: -1px;
        border-radius: inherit;
        background: linear-gradient(135deg, #9333ea, #06b6d4, #9333ea);
        background-size: 300% 300%;
        animation: gradShift 4s ease infinite;
        z-index: -1;
      }
      @keyframes gradShift { 0%,100%{ background-position:0% 50% } 50%{ background-position:100% 50% } }

      /* ── Floating orbs ── */
      .orb {
        border-radius: 50%;
        filter: blur(90px);
        opacity: 0.28;
        position: absolute;
        pointer-events: none;
        animation: float 9s ease-in-out infinite;
      }
      .orb-b { animation-delay: -3.5s; animation-duration: 12s; }
      .orb-c { animation-delay: -6s;   animation-duration: 15s; }

      /* ── Card hover lift ── */
      .card-hover { transition: transform 0.2s ease, box-shadow 0.2s ease; }
      .card-hover:hover { transform: translateY(-3px); box-shadow: 0 16px 48px rgba(147,51,234,0.13); }

      /* ── Sidebar nav active ── */
      .nav-active {
        background: linear-gradient(135deg, rgba(147,51,234,0.18), rgba(6,182,212,0.08));
        box-shadow: 0 0 18px rgba(147,51,234,0.1);
      }

      /* ── Input focus glow ── */
      .input-glow:focus {
        outline: none;
        border-color: #9333ea;
        box-shadow: 0 0 0 3px rgba(147,51,234,0.14);
      }

      /* ── Stagger helpers ── */
      .s1 { animation-delay: 0.06s; }
      .s2 { animation-delay: 0.12s; }
      .s3 { animation-delay: 0.18s; }
      .s4 { animation-delay: 0.24s; }
      .s5 { animation-delay: 0.30s; }

      /* ── Auto-upgrade all white cards in main content area ── */
      .flex-1.ml-64 .bg-white {
        background: rgba(255,255,255,0.94) !important;
        backdrop-filter: blur(12px) saturate(1.8);
      }
      .flex-1.ml-64 .shadow-sm {
        box-shadow: 0 4px 24px rgba(147,51,234,0.07), 0 1px 0 rgba(255,255,255,0.85) inset !important;
      }
      .flex-1.ml-64 .border-gray-100 {
        border-color: rgba(147,51,234,0.08) !important;
      }
      .flex-1.ml-64 .border-gray-200 {
        border-color: rgba(147,51,234,0.12) !important;
      }

      /* ── Upgrade table headers ── */
      .flex-1.ml-64 thead tr {
        background: linear-gradient(135deg, rgba(147,51,234,0.05) 0%, rgba(6,182,212,0.03) 100%) !important;
      }
      .flex-1.ml-64 thead th {
        color: #6b21a8 !important;
        border-bottom: 1px solid rgba(147,51,234,0.1);
      }

      /* ── Row hover purple tint ── */
      .flex-1.ml-64 tbody tr:hover {
        background: rgba(147,51,234,0.03) !important;
      }

      /* ── Primary buttons get lift ── */
      .flex-1.ml-64 button[class*="bg-indigo"],
      .flex-1.ml-64 a[class*="bg-indigo"] {
        transition: transform 0.15s ease, box-shadow 0.15s ease !important;
      }
      .flex-1.ml-64 button[class*="bg-indigo"]:hover,
      .flex-1.ml-64 a[class*="bg-indigo"]:hover {
        transform: translateY(-1px);
        box-shadow: 0 8px 24px rgba(147,51,234,0.35) !important;
      }

      /* ── Tab active state upgrade ── */
      .flex-1.ml-64 button[class*="bg-indigo-600"] {
        background: linear-gradient(135deg,#9333ea,#7e22ce) !important;
        box-shadow: 0 4px 14px rgba(147,51,234,0.4) !important;
      }

      /* ── Input fields in content area ── */
      .flex-1.ml-64 input[class*="border"],
      .flex-1.ml-64 select[class*="border"] {
        border-color: rgba(147,51,234,0.2) !important;
        background: rgba(250,245,255,0.5) !important;
        transition: border-color 0.2s, box-shadow 0.2s;
      }
      .flex-1.ml-64 input:focus,
      .flex-1.ml-64 select:focus {
        border-color: #9333ea !important;
        box-shadow: 0 0 0 3px rgba(147,51,234,0.12) !important;
        outline: none !important;
        background: rgba(255,255,255,0.9) !important;
      }

      /* ── Modal glass upgrade ── */
      [class*="z-50"][class*="items-center"] > div > .bg-white {
        background: rgba(255,255,255,0.97) !important;
        box-shadow: 0 24px 64px rgba(147,51,234,0.18), 0 4px 16px rgba(0,0,0,0.14) !important;
        border: 1px solid rgba(147,51,234,0.1) !important;
      }

      /* ── Rounded corner upgrade (xl → 2xl feel) ── */
      .flex-1.ml-64 .rounded-xl { border-radius: 1rem !important; }
      .flex-1.ml-64 .rounded-lg  { border-radius: 0.75rem !important; }
    </style>
  </head>
  <body class="bg-slate-50 text-gray-900 antialiased">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
